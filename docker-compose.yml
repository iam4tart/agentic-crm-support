version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: always

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: python ui/app.py
    depends_on:
      - api
    restart: always
