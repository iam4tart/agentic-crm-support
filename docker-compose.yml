services:
  api:
    image: ghcr.io/iam4tart/agentic-crm-support-api:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    image: ghcr.io/iam4tart/agentic-crm-support-ui:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - .:/app
