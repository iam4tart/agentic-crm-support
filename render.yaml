services:
  # Backend API
  - type: web
    name: crm-api
    env: docker
    dockerfilePath: docker/Dockerfile.api
    plan: starter
    region: oregon
    envVars:
      - key: hf_token
        sync: false
      - key: notion_api_key
        sync: false
      - key: jira_base_url
        sync: false
      - key: jira_username
        sync: false
      - key: jira_api_token
        sync: false
      - key: chroma_db_dir
        value: /data/chroma_db
    disk:
      name: chroma-data
      mountPath: /data/chroma_db
      sizeGB: 1

  # Frontend UI
  - type: web
    name: crm-ui
    env: docker
    dockerfilePath: docker/Dockerfile.ui
    plan: starter
    region: oregon
    envVars:
      - key: API_URL
        fromService:
          name: crm-api
          type: web
          property: host
